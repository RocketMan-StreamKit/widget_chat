name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Publish static addon release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read manifest version
        id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release for ${TAG}, creating."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release assets
        if: steps.check.outputs.should_release == 'true'
        run: |
          mkdir -p release release-assets
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'release' \
            --exclude 'release-assets' \
            --exclude 'storage_data.json' \
            --exclude '.gitignore' \
            ./ release/

          cp manifest.json release-assets/manifest.json
          ICON=$(node -p "require('./manifest.json').icon || ''")
          if [ -n "$ICON" ] && [ -f "$ICON" ]; then
            cp "$ICON" "release-assets/$ICON"
          fi

          cd release
          zip -r ../release-assets/main.zip .
          cd ..

      - name: List release files
        if: steps.check.outputs.should_release == 'true'
        id: files
        run: |
          FILES="release-assets/main.zip"$'\n'"release-assets/manifest.json"
          ICON=$(node -p "require('./manifest.json').icon || ''")
          if [ -n "$ICON" ] && [ -f "release-assets/$ICON" ]; then
            FILES="${FILES}"$'\n'"release-assets/${ICON}"
          fi
          {
            echo "list<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "$FILES"

      - name: Create GitHub release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: false
          body_path: .github/release-body.md
          files: ${{ steps.files.outputs.list }}
